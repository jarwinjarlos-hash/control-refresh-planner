<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control System Tech Refresh Planner</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">

  <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
      <span class="navbar-brand mb-0 h1">🎛️ Control System Tech Refresh Planner</span>
    </div>
  </nav>

  <div class="container mb-5">
    <div class="row mb-4">
      <div class="col-md-6 mb-3">
        <div class="card shadow-sm p-3 h-100">
          <h5 class="card-title">Project S-Curve Trend</h5>
          <canvas id="trendChart" height="140"></canvas>
        </div>
      </div>
      <div class="col-md-6 mb-3">
        <div class="card shadow-sm p-3 h-100">
          <h5 class="card-title">Pending Devices per Area</h5>
          <canvas id="areaReportChart" height="140"></canvas>
        </div>
      </div>
    </div>

    <div class="row mb-4">
      <div class="col-12">
        <div class="card shadow-sm p-3">
          <h5 class="card-title text-dark">📋 Hardware Type Breakdown Report (Per Area)</h5>
          <div class="table-responsive mt-2">
            <table class="table table-sm table-bordered table-striped align-middle text-center small mb-0">
              <thead class="table-secondary">
                <tr>
                  <th>Physical Area</th>
                  <th>Device Type</th>
                  <th>Total Count</th>
                  <th>Completed</th>
                  <th>Outstanding (Pending)</th>
                  <th>Progress</th>
                </tr>
              </thead>
              <tbody id="typeBreakdownTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-md-4">
        <div class="card shadow-sm p-3 mb-3">
          <h6 class="text-primary">➕ Add New Activity</h6>
          <form id="activityForm">
            <div class="mb-2"><input type="text" id="actName" class="form-control form-control-sm" placeholder="Activity Name" required></div>
            <div class="mb-2"><input type="text" id="actArea" class="form-control form-control-sm" placeholder="Area (e.g., Control Room)" required></div>
            <div class="mb-2"><label class="small text-muted m-0">Target Start</label><input type="date" id="actStart" class="form-control form-control-sm" required></div>
            <div class="mb-2"><label class="small text-muted m-0">Target Complete</label><input type="date" id="actEnd" class="form-control form-control-sm" required></div>
            <button type="submit" class="btn btn-primary btn-sm w-100">Add Activity</button>
          </form>
        </div>

        <div class="card shadow-sm p-3 mb-3">
          <h6 class="text-success">➕ Add Hardware Device Tag</h6>
          <form id="deviceForm">
            <div class="mb-2">
              <label class="small text-muted m-0">Device Type</label>
              <select id="devType" class="form-select form-select-sm" required>
                <option value="Backbone Network Switch">Backbone Network Switch</option>
                <option value="Firewall">Firewall</option>
                <option value="L2 Switch">L2 Switch</option>
                <option value="Controller">Controller</option>
                <option value="I/O Module">I/O Module</option>
                <option value="Server/HMI Workstation">Server/HMI Workstation</option>
              </select>
            </div>
            <div class="mb-2"><input type="text" id="devTag" class="form-control form-control-sm" placeholder="Device Tag (e.g., Switch Bckbne-A)" required></div>
            <div class="mb-2">
              <label class="small text-muted m-0">Assign to Activity Context</label>
              <select id="devActivitySelect" class="form-select form-select-sm" required><option value="">-- Select Activity --</option></select>
            </div>
            <button type="submit" class="btn btn-success btn-sm w-100">Add Device to Checklist</button>
          </form>
        </div>
      </div>

      <div class="col-md-8">
        <div class="card shadow-sm p-3">
          <h5 class="mb-3">Activity & Hardware Checklist</h5>
          <div id="activityContainer"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const ACT_KEY = 'gh_refresh_acts';
    const DEV_KEY = 'gh_refresh_devs';

    let state = { activities: [], devices: [] };

    function loadState() {
      const storedActs = localStorage.getItem(ACT_KEY);
      const storedDevs = localStorage.getItem(DEV_KEY);
      if(storedActs) state.activities = JSON.parse(storedActs);
      if(storedDevs) state.devices = JSON.parse(storedDevs);
    }

    function saveState() {
      localStorage.setItem(ACT_KEY, JSON.stringify(state.activities));
      localStorage.setItem(DEV_KEY, JSON.stringify(state.devices));
    }

    const activityForm = document.getElementById('activityForm');
    const deviceForm = document.getElementById('deviceForm');
    const devActivitySelect = document.getElementById('devActivitySelect');
    const activityContainer = document.getElementById('activityContainer');
    const typeBreakdownTableBody = document.getElementById('typeBreakdownTableBody');
    let trendChart, reportChart;

    activityForm.addEventListener('submit', (e) => {
      e.preventDefault();
      state.activities.push({
        id: Date.now(),
        name: document.getElementById('actName').value.trim(),
        area: document.getElementById('actArea').value.trim(),
        start: document.getElementById('actStart').value,
        end: document.getElementById('actEnd').value
      });
      activityForm.reset();
      saveState();
      renderApp();
    });

    deviceForm.addEventListener('submit', (e) => {
      e.preventDefault();
      state.devices.push({
        id: Date.now(),
        type: document.getElementById('devType').value,
        tag: document.getElementById('devTag').value.trim(),
        activityId: parseInt(devActivitySelect.value),
        status: 'Pending'
      });
      deviceForm.reset();
      saveState();
      renderApp();
    });

    window.toggleDevice = function(id) {
      const target = state.devices.find(d => d.id === id);
      if (target) {
        target.status = target.status === 'Pending' ? 'Complete' : 'Pending';
        saveState();
        renderApp();
      }
    };

    function renderApp() {
      devActivitySelect.innerHTML = '<option value="">-- Select Activity --</option>';
      state.activities.forEach(act => {
        devActivitySelect.innerHTML += `<option value="${act.id}">${act.area} - ${act.name}</option>`;
      });

      activityContainer.innerHTML = '';
      if (state.activities.length === 0) {
        activityContainer.innerHTML = '<p class="text-muted">No activities defined yet.</p>';
        typeBreakdownTableBody.innerHTML = '<tr><td colspan="6" class="text-muted text-center">No data available.</td></tr>';
        updateCharts({}, []);
        return;
      }

      let areaPendingCounts = {};
      let matrix = {};

      state.activities.forEach(act => {
        const actDevices = state.devices.filter(d => d.activityId === act.id);
        const total = actDevices.length;
        const completed = actDevices.filter(d => d.status === 'Complete').length;
        const pending = total - completed;
        const pct = total > 0 ? Math.round((completed / total) * 100) : 0;

        if (!areaPendingCounts[act.area]) areaPendingCounts[act.area] = 0;
        areaPendingCounts[act.area] += pending;

        actDevices.forEach(dev => {
          if (!matrix[act.area]) matrix[act.area] = {};
          if (!matrix[act.area][dev.type]) {
            matrix[act.area][dev.type] = { total: 0, completed: 0, pending: 0 };
          }
          matrix[act.area][dev.type].total += 1;
          if (dev.status === 'Complete') {
            matrix[act.area][dev.type].completed += 1;
          } else {
            matrix[act.area][dev.type].pending += 1;
          }
        });

        let itemsHtml = '';
        actDevices.forEach(dev => {
          const checked = dev.status === 'Complete' ? 'checked' : '';
          itemsHtml += `
            <div class="form-check ms-3 my-1">
              <input class="form-check-input" type="checkbox" ${checked} onclick="toggleDevice(${dev.id})" id="dev-${dev.id}">
              <label class="form-check-label small ${dev.status === 'Complete' ? 'text-decoration-line-through text-muted' : ''}" for="dev-${dev.id}">
                <span class="badge bg-secondary me-1" style="font-size:10px;">${dev.type}</span> <strong>${dev.tag}</strong>
              </label>
            </div>
          `;
        });

        activityContainer.innerHTML += `
          <div class="card mb-3 p-3 border-start border-3 border-primary shadow-sm">
            <div class="d-flex justify-content-between align-items-center">
              <div>
                <strong class="text-dark">[${act.area}] ${act.name}</strong>
                <div class="text-muted small">Timeline: ${act.start} to ${act.end}</div>
              </div>
              <span class="badge bg-primary rounded-pill">${pct}% Done</span>
            </div>
            <div class="progress my-2" style="height: 6px;">
              <div class="progress-bar bg-success" style="width: ${pct}%"></div>
            </div>
            <div class="mt-2">${itemsHtml || '<em class="text-muted small ms-3 d-block">No hardware added here yet.</em>'}</div>
          </div>
        `;
      });

      typeBreakdownTableBody.innerHTML = '';
      const targetAreas = Object.keys(matrix);
      if (targetAreas.length === 0) {
        typeBreakdownTableBody.innerHTML = '<tr><td colspan="6" class="text-muted text-center">No devices added.</td></tr>';
      } else {
        targetAreas.forEach(area => {
          Object.keys(matrix[area]).forEach(type => {
            const dataRow = matrix[area][type];
            const progressPct = dataRow.total > 0 ? Math.round((dataRow.completed / dataRow.total) * 100) : 0;
            typeBreakdownTableBody.innerHTML += `
              <tr>
                <td><strong>${area}</strong></td>
                <td><span class="text-secondary fw-semibold">${type}</span></td>
                <td><span class="badge bg-dark">${dataRow.total}</span></td>
                <td><span class="badge bg-success">${dataRow.completed}</span></td>
                <td><span class="badge bg-danger">${dataRow.pending}</span></td>
                <td>
                  <div class="d-flex align-items-center justify-content-center">
                    <span class="me-2 fw-bold" style="min-width:35px;">${progressPct}%</span>
                    <div class="progress w-100" style="height: 8px; max-width:100px;">
                      <div class="progress-bar bg-success" style="width: ${progressPct}%"></div>
                    </div>
                  </div>
                </td>
              </tr>
            `;
          });
        });
      }

      updateCharts(areaPendingCounts, state.devices);
    }

    function updateCharts(areaData, devices) {
      const rCtx = document.getElementById('areaReportChart').getContext('2d');
      if (reportChart) reportChart.destroy();
      reportChart = new Chart(rCtx, {
        type: 'bar',
        data: {
          labels: Object.keys(areaData),
          datasets: [{ label: 'Pending Hardware', data: Object.values(areaData), backgroundColor: '#dc3545' }]
        },
        options: { responsive: true }
      });

      const tCtx = document.getElementById('trendChart').getContext('2d');
      if (trendChart) trendChart.destroy();
      
      const total = devices.length;
      const done = devices.filter(d => d.status === 'Complete').length;
      const actualPct = total > 0 ? Math.round((done / total) * 100) : 0;

      trendChart = new Chart(tCtx, {
        type: 'line',
        data: {
          labels: ['Start', 'Midpoint', 'Target'],
          datasets: [
            { label: 'Planned Target', data: [0, 50, 100], borderColor: '#0d6efd', borderDash: [5,5], fill: false },
            { label: 'Your Actual Progress', data: [0, actualPct / 2, actualPct], borderColor: '#198754', fill: false }
          ]
        },
        options: { responsive: true, scales: { y: { min: 0, max: 100 } } }
      });
    }

    loadState();
    renderApp();
  </script>
</body>
</html>
